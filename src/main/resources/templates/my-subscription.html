<!doctype html>
<html lang="en" data-bs-theme="auto" xmlns:th="http://www.thymeleaf.org"  >
<head>
    <meta charset="utf-8">
    <title>PerfectFit</title>
    <link rel="stylesheet" href= "https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href= "../static/styles/my-subscription.css">
    <link rel="stylesheet" href= "../static/styles/header.css">
    <link rel="stylesheet" href="../static/styles/side-bar.css">
</head>
<body>
<header class="container-expands" th:insert = "../static/blocks/header :: header"> </header>
<div class="container-fluid">
    <div class="row">
        <div class="col-lg-2 sidebar" th:insert = "../static/blocks/side-nav-bar :: side-bar"> </div>

        <div class="col-lg-10 content">


            <h1 style="font-weight: bold; color: yellow; margin-bottom: 10%; text-align: center;">Subscription</h1>

            <div class="subscription-row">
                <th:block th:if="${subscription}">
                    <div class="container" style="background-color: rgba(245,245,245,0.49); border-radius: 15px; padding: 10px 20px;">
                        <div class="row" style="display: flex; align-items: center;">
                            <div class="col-md-6">
                                <h2 th:text="${subscription.getSubscription().getName()}" style="font-size: 200%; color: #0c131a; width: 20%"></h2>
                                <p th:text="'Deadline: ' + ${subscription.getDeadlineSubscription()}"></p>
                                <p th:text="'Courses left: ' + ${number}"></p>
                                </div>
                            <div class="col-md-6" style="text-align: right">
                                <button type="button" class="btn btn-success add-btn" data-toggle="modal" data-target="#confirmUpdateModal" style="margin-right: 20px">Update</button>
                                <button type="button" class="btn btn-danger delete-btn" data-toggle="modal" data-target="#confirmDeleteModal">Delete</button>
                            </div>
                        </div>
                    </div>

                </th:block>
                <th:block th:unless="${subscription}">
                    <h3 style="color:whitesmoke; text-align: center;display: flex; justify-content: center; align-items: center;height: 80%"> It seems you don't have a subscription yet.</h3>
                </th:block>
            </div>
        </div>
    </div>
</div>



<th:block th:if="${subscription}">

    <div class="modal fade" id="confirmUpdateModal" tabindex="-1" role="dialog" aria-labelledby="confirmDeleteModal" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <form action="/client/update-subscription" method="post">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="confirmUpdateModalLabel">Update</h5>
                    <button type="button" class="close" data-dismiss="modal" style="border: none; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <label>Enter number of months: </label>
                    <input type="number" name="numberOfDays" placeholder="Enter number of months">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn add-btn">Confirm</button>
                </div>
            </div>
            </form>
        </div>
    </div>


    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" role="dialog" aria-labelledby="confirmDeleteModal" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered"   style="width: 360px" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalLabel">Are you sure?</h5>
                    <button type="button" class="close" data-dismiss="modal" style="border: none; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <p>You will lose success to all of your courses</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <form action="/client/delete-subscription" method="post">
                        <button type="submit" class="btn btn-danger delete-btn">Confirm</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultModalLabel">Purchase Result</h5>
                    <button type="button" class="close" data-dismiss="modal" style="border: none; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <p id="resultElement"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>




</th:block >

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://www.thymeleaf.org/thymeleaf.js"></script>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>


<script>
    $(document).ready(function(){
        var urlParams = new URLSearchParams(window.location.search);
        var result = urlParams.get('result');

        if (result) {
            $('#resultElement').text(result);
            $('#resultModal').modal('show');
        }
    });
</script>



</body>
</html>
