<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" >
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/styles/home-subscriptions-gage.css">
    <link rel="stylesheet" href="../static/styles/header.css">

</head>
<body>


<header class="container-expands" th:insert="../static/blocks/header :: header"></header>

<div class="container">
    <div class="row">
        <th:block th:each="subscription : ${subscriptions}">
            <div class="col-sm-4">
                    <form th:id="'form-' + ${subscription.id}" action="/buy-subscription" method="post">
                        <section th:id="'subscription-' + ${subscription.id}" class="green subscription text-center">
                            <h2 style="color: rgba(231, 51, 184, 1); text-shadow: 0 0 10px rgb(227, 159, 209)">
                                <b th:text="${subscription.name}"></b>
                            </h2>
                            <p th:text="${subscription.description}"></p>
                            <p><i th:text="'Courses: ' + ${subscription.getMaxCoursesCapacity()}"></i></p>
                            <p><i th:text="'Price: $' + ${subscription.price} + '/month'"></i></p>
                            <input type="hidden" name="id" th:value="${subscription.id}" />
                            <div sec:authorize="isAuthenticated()">
                            <div class="flex-container" style="justify-content: center;">
                                <button type="button" class="btn btn-dark" onclick="submitForm(this);">
                                    Buy now!
                                </button>
                            </div>
                            </div>
                            <div sec:authorize="isAnonymous()">
                                <div class="flex-container" style="justify-content: center;">
                                    <button type="button" class="btn btn-dark" data-target="#warningModal" data-toggle="modal">
                                        Buy now!
                                    </button>
                                </div>
                            </div>
                        </section>
                    </form>
                </div>
        </th:block>
    </div>
</div>


<div sec:authorize="isAnonymous()">
    <div class="modal warn-modal" id="warningModal" >
        <div class="modal-dialog" aria-hidden="true">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="warningModalLabel" style="color: coral"> Warning! </h5>
                    <button type="button" class="close" data-dismiss="modal" style="border: none; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <p>It seems you aren`t authenticated. For buying a subscription you need to be logged in. </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>


</div>

<div sec:authorize="isAuthenticated()">
    <div class="modal" id="custom-modal" >
        <div class="modal-dialog" aria-hidden="true">
            <div class="modal-content">
                <div class="modal-header">
                <h5 class="modal-title" id="myModalLabel"> Are you sure? </h5>
                <button type="button" id="close-button" class="close" data-dismiss="modal" style="border: none; background: none">
                    <img src="../static/images/close-bold-dark.svg">
                </button>
            </div>
                <div class="modal-body">
                    <p>Confirm your purchase</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="confirm-button">Confirm</button>
                    <button type="button" class="btn btn-secondary" id="cancel-button">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultModalLabel">Purchase Result</h5>
                    <button type="button" class="close" data-dismiss="modal" style="border: none; border-radius: 20px; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <p id="saleResultElement"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


    <!-- Подключение скриптов Bootstrap и jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

    <script>
        function submitForm(button) {
            var form = button.closest('form'); // Находим ближайшую форму, содержащую кнопку

            var modal = document.getElementById('custom-modal');
            modal.style.display = 'block';

            var confirmButton = document.getElementById('confirm-button');
            var cancelButton = document.getElementById('cancel-button');
            var closeButton = document.getElementById('close-button');

            confirmButton.addEventListener('click', function() {
                modal.style.display = 'none';
                form.submit();
            });

            cancelButton.addEventListener('click', function() {
                modal.style.display = 'none';
            });

            closeButton.addEventListener('click', function()
            {
                modal.style.display = 'none';
            });
        }
    </script>

    <script>
        $(document).ready(function(){
            // Получение значения параметра "saleResult" из URL
            var urlParams = new URLSearchParams(window.location.search);
            var saleResult = urlParams.get('saleResult');

            if (saleResult) {
                $('#saleResultElement').text(saleResult);
                $('#resultModal').modal('show');
            }
        });
    </script>

</div>









</body>
</html>
