<!doctype html>
<html lang="en" data-bs-theme="auto" xmlns:th="http://www.thymeleaf.org" >
<head>
  <meta charset="utf-8">
  <title>PerfectFit</title>
  <link rel="stylesheet" href= "https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href= "../static/styles/my-courses.css">
  <link rel="stylesheet" href= "../static/styles/header.css">
  <link rel="stylesheet" href="../static/styles/side-bar.css">
</head>
<body>
<header class="container-expands" th:insert = "../static/blocks/header :: header"> </header>
  <div class="container-fluid">
    <div class="row">

      <div class="col-lg-2 sidebar" th:insert = "../static/blocks/side-nav-bar :: side-bar"> </div>

      <div class="col-lg-10 content" >

        <div class="row">

          <div class="col-md-1" style="display: flex;align-items: center;justify-content: center;">
            <a href="#" class="left-arrow"><img style="height: 48px;  " src="../static/images/left-arrow.svg"></a>
          </div>

          <div class="col md-10">
            <h1 style="font-weight: bold; color: yellow; text-align: center; margin-bottom: 14px">Course List</h1>
            <table class="table table-striped" style="height: 700px; background-color: rgba(245,245,245,0.75); border-radius: 20px; margin-bottom: 5%; overflow: hidden">
              <thead>
              <tr>
                <th style="padding-left: 10px; color: #0c131a; width: 20%">Course</th>
                <th style="color: #0c131a; width: 40%">Description</th>
                <th style="color: #0c131a">Declined days</th>
                <th style="color: #0c131a">Trainer</th>
                <th style="color: #0c131a">Delete</th>
              </tr>
              </thead>
              <th:block th:if="${courses}">
              <tbody id="course-list">
                <tr th:each="course, courseIndex : ${courses}" >
                  <td th:text="${course.get(0)}" style="color: #0c131a; padding-left: 10px;  width: 20%"></td>
                  <td th:text="${course.get(1)}" style="color: #525456;"></td>
                  <td th:text="${course.get(3)}" style="color: #525456;"></td>
                  <td th:text="${course.get(2)}" style="color: #0c131a; width: 20%"></td>
                  <td>
                    <form action="/client/delete-course" method="post">
                      <input type="hidden" name="id" th:value="${course.get(4)}">
                      <button type="submit" class="btn btn-danger delete-course-btn">Remove course</button>
                    </form>
                  </td>
                </tr>
                </tbody>
              </th:block>
            </table>
          </div>
          <div class="col-md-1" style="display: flex;align-items: center;justify-content: center;">
            <a href="#" class="right-arrow"><img style="height: 48px; " src="../static/images/right-arrow.svg"></a>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>




<script>
  // Получение текущего значения dateIndex
  const queryString = window.location.search;
  const urlParams = new URLSearchParams(queryString);
  const index = parseInt(urlParams.get('index'));
  var maxPage = [[${maxPages}]];

  // Обработка клика на стрелку влево
  const leftArrow = document.querySelector('.left-arrow');
  leftArrow.addEventListener('click', function() {
    const updatedIndex = index - 1;
    if (updatedIndex >= 0) {
      window.location.href = '/client/my-courses?index=' + updatedIndex;
    }
  });

  // Обработка клика на стрелку вправо
  document.addEventListener("DOMContentLoaded", function() {
    const rightArrow = document.querySelector('.right-arrow');
    rightArrow.addEventListener('click', function() {
      const updatedIndex = index + 1;
      if (updatedIndex < maxPage) {
        window.location.href = '/client/my-courses?index=' + updatedIndex;
      }
    });
  });
</script>



<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://www.thymeleaf.org/thymeleaf.js"></script>


<!-- Подключение скриптов Bootstrap и jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

</body>
</html>
