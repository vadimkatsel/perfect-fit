<!doctype html>
<html lang="en" data-bs-theme="auto" xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="utf-8">
    <title>PerfectFit</title>
    <link rel="stylesheet" href= "https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href= "../static/styles/my-page-client.css">
    <link rel="stylesheet" href= "../static/styles/header.css">
    <link rel="stylesheet" href="../static/styles/side-bar.css">


</head>

<body th:attr="data-schedule=${schedule}">
<header class="container-expands" th:insert = "../static/blocks/header :: header"> </header>

<div class="container-fluid">
    <div class="row">
        <!-- Навигационное меню слева -->
        <div class="col-lg-2 sidebar" th:insert = "../static/blocks/side-nav-bar :: side-bar"> </div>


        <div class="col-lg-10 content">
            <!--Schedule-->
            <div class="container">

                <div class="container-title">
                    <h1 style="color: #FBF601; font-weight: bold">Schedule</h1>
                </div>


                <div class="row">
                    <div class="col-md-1" style="display: flex;align-items: center;justify-content: center;">
                        <a href="#" class="left-arrow"><img style="height: 48px;  " src="../static/images/left-arrow.svg"></a>
                    </div>

                    <div class="col-md-10">
                        <div class="row">
                            <div class="col-md-4" th:each="daySchedule : ${schedule}">
                                <div class="schedule-warp">
                                    <div class="day" style="font-size: 110%; text-align: center" th:text="${daySchedule.key}"></div>
                                    <div th:each="timeSchedule : ${daySchedule.value}">
                                        <div class="schedule-card">
                                            <div class="insidebox">
                                                <h6 class="schedule-tag" th:text="${timeSchedule.key}"></h6>
                                                <h6 class="schedule-start" th:text="${timeSchedule.value}"></h6>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-1" style="display: flex;align-items: center;justify-content: center;">
                        <a href="#" class="right-arrow"><img style="height: 48px; " src="../static/images/right-arrow.svg"></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="resultModalLabel">Purchase Result</h5>
                <button type="button" class="close" data-dismiss="modal" style="border: none; background: none">
                    <img src="../static/images/close-bold-dark.svg">
                </button>
            </div>
            <div class="modal-body">
                <p id="resultElement"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="absenceModal" tabindex="-1" role="dialog" aria-labelledby="absenceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" style="display: flex;align-items: center;justify-content: center; height: 100vh;" role="document">
        <div class="modal-content" style=" height: 500px; width: 800px; background-color: rgb(12,19,27)!important; ">
            <div class="modal-header" style="text-align: center!important; border: none;">
                <h5 class="modal-title" id="absenceModalLabel" style="color: #f8f301; font-size: 200%">Absence Form</h5>
                <button type="button" class="close" data-dismiss="modal" style="background: none; border: none" aria-label="Close">
                    <img src="../static/images/close-bold.svg">
                </button>
            </div>
            <div class="modal-body">

                <form method="post" action="/client/save-absence-record">
                    <input name="${_csrf.parameterName}" value="${_csrf.token}" type="hidden">
                    <div class="form-group">
                        <label for="reason" style="color: floralwhite !important;">Reason:</label>
                        <textarea id="reason" name="reason" rows="6" maxlength="2000" placeholder="Enter your reason (max 2000 characters)" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="absenceDateBegin" style="color: floralwhite !important" >Absence Date Begin:</label>
                        <input type="date" id="absenceDateBegin" name="absenceDateBegin" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="absenceDateEnd"style="color: floralwhite !important;" >Absence Date End:</label>
                        <input type="date" class="form-control" id="absenceDateEnd" name="absenceDateEnd" required>
                    </div>
                    <div class="modal-footer" style="border: none;">
                        <button type="button" class="btn btn-secondary" onclick="resetForm()" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Submit</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>




<!-- Подключение скриптов Bootstrap и jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

<script>
    // Проверяем, было ли окно уже показано в текущей сессии
    var isPopupShown = sessionStorage.getItem('popupShown');

    if (!isPopupShown) {
        // Если окно не было показано, отображаем его
        var popup = document.getElementById('popup');
        popup.style.display = 'block';

        // Устанавливаем флаг, что окно было показано
        sessionStorage.setItem('popupShown', 'true');
    }
</script>


<script>
    function resetForm() {
    document.getElementById("AbsenceForm").reset();
}</script>

<script>
    // Функция для форматирования даты
    function formatDate(dateString) {
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        const date = new Date(dateString);
        return date.toLocaleDateString('en', options);
    }

    // Находим все элементы с классом "day" и изменяем их содержимое
    const dayElements = document.querySelectorAll('.day');
    dayElements.forEach(function(element) {
        const originalDate = element.textContent;
        const formattedDate = formatDate(originalDate);
        element.textContent = formattedDate;
    });
</script>


<script>
    // Получение текущего значения dateIndex
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const dateIndex = parseInt(urlParams.get('dateIndex'));

    // Обработка клика на стрелку влево
    const leftArrow = document.querySelector('.left-arrow');
    leftArrow.addEventListener('click', function() {
        const updatedDateIndex = dateIndex - 1;
        if (updatedDateIndex >= 0) {
            window.location.href = '/client?dateIndex=' + updatedDateIndex;
        }
    });

    // Обработка клика на стрелку вправо
    const rightArrow = document.querySelector('.right-arrow');
    rightArrow.addEventListener('click', function() {
        const updatedDateIndex = dateIndex + 1;
        window.location.href = '/client?dateIndex=' + updatedDateIndex;
    });
</script>
<script>
    $(document).ready(function(){
        // Получение значения параметра "saleResult" из URL
        var urlParams = new URLSearchParams(window.location.search);
        var result = urlParams.get('result');

        if (result) {
            $('#resultElement').text(result );
            $('#resultModal').modal('show');
        }
    });
</script>



</body>
</html>
