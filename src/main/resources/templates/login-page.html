<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
  <link rel="stylesheet" href= "https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href= "../static/styles/login-page.css">
  <link rel="stylesheet" href= "../static/styles/header.css">
</head>
<body>
<div class="container-expands" th:insert = "../static/blocks/header :: header"> </div>
<div class="wrapper fadeInDown">
  <div id="formContent">
    <!-- Tabs Titles -->
    <h1> Login </h1>
      <div th:if = "${logout}" class="alert alert-info" role="alert">You've been logged out successfully.</div>
      <div th:if = "${error}"class="alert alert-danger" role="alert">Invalid Username or Password!</div>

    <!-- Login Form -->
    <form method='POST'>
      <input name="${_csrf.parameterName}" value="${_csrf.token}" type="hidden">
      <input type="text" id="username" class="fadeIn first" name="username" placeholder="email">
      <input type="text" id="password" class="fadeIn second" name="password" placeholder="password">
      <input type="submit" class="fadeIn fourth" value="Log In">
    </form>

    <!-- Remind Passowrd -->
    <div id="formFooter">

      <a href="/registration" class="underlineHover fadeIn third"> Don`t have an account? </a>

    </div>

  </div>
</div>
</body>
</html>
