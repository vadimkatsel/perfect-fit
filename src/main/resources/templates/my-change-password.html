<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/styles/login-page.css">
    <link rel="stylesheet" href="../static/styles/header.css">
</head>
<body>
<div class="container-expands" th:insert="../static/blocks/header :: header"></div>
<div class="wrapper fadeInDown">
    <div id="formContent">
        <div sec:authorize="hasRole('ROLE_CLIENT')">
        <h1>Change Password</h1>
        <div th:if="${errorVoid}" class="error-message">
            <span style="color: #a10000" th:text="${errorVoid}"></span>
        </div>
        <div th:if="${errorWithNewPassword}" class="error-message">
            <span style="color: #a10000" th:text="${errorWithNewPassword}"></span>
        </div>
        <div th:if="${errorWithOldPassword}" class="error-message">
            <span style="color: #a10000" th:text="${errorWithOldPassword}"></span>
        </div>
        <form th:action="@{'/client/change-password'}" method="post">
            <div class="form-group">
                <input class="fadeIn first" type="password" minlength="6" maxlength="12" name="current-password" id="current-password"
                       placeholder="Enter current password">
            </div>
            <div class="form-group">
                <input class="fadeIn second" type="password" minlength="6" maxlength="12" name="new-password" id="new-password"
                       placeholder="Enter new password">
            </div>
            <div class="form-group">
                <input class="fadeIn third" type="password"  minlength="6" maxlength="12" name="confirm-password" id="confirm-password"
                       placeholder="Confirm new password">
            </div>
            <input type="submit" class="fadeIn fourth" value="Change">
        </form>
        </div>


        <div sec:authorize="hasRole('ROLE_COACH')">
            <h1>Change Password</h1>
            <div th:if="${errorVoid}" class="error-message">
                <span style="color: #a10000" th:text="${errorVoid}"></span>
            </div>
            <div th:if="${errorWithNewPassword}" class="error-message">
                <span style="color: #a10000" th:text="${errorWithNewPassword}"></span>
            </div>
            <div th:if="${errorWithOldPassword}" class="error-message">
                <span style="color: #a10000" th:text="${errorWithOldPassword}"></span>
            </div>
            <form th:action="@{'/coach/change-password'}" method="post">
                <div class="form-group">
                    <input class="fadeIn first" type="password" name="current-password" minlength="6" maxlength="12" id="current-password"
                           placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <input class="fadeIn second" type="password" name="new-password" minlength="6" maxlength="12" id="new-password"
                           placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <input class="fadeIn third" type="password" name="confirm-password" minlength="6" maxlength="12" id="confirm-password"
                           placeholder="Confirm new password">
                </div>
                <input type="submit" class="fadeIn fourth" value="Change">
            </form>
        </div>
    </div>

</div>
</body>
</html>
