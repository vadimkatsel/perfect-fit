<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security" >
    <title>Courses</title>
    <link rel="stylesheet" href= "https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href= "../static/styles/home-courses-page.css">
    <link rel="stylesheet" href= "../static/styles/header.css">
</head>
<body>
<header class="container-expands" th:insert = "../static/blocks/header :: header"> </header>

<div class="container">
    <div class="row">
        <div class="col-md-1" style="display: flex;align-items: center;justify-content: center;">
            <a href="#" class="left-arrow"><img style="height: 48px;  " src="../static/images/left-arrow.svg"></a>
        </div>
        <div class = "col-md-10">
            <div class="row">
                <th:block th:each="course : ${courses}">
                    <div class="col-sm-4">
                        <form th:id="'course-' + ${course.getKey().id}" action="/enrol-course" method="post">
                        <section class="green subscription text-center">
                            <div class="col cardd">
                                <h4 class="row-sm-2 cardd__title" th:text="${course.getKey().getName()}"></h4>
                                <p class="row-sm-4 cardd__description" th:text="${course.getKey().getDescription()}"></p>
                                <input type="hidden" name="id" th:value="${course.getKey().id}" />
                                <b class="row-sm-1 cardd__description">Days of week:</b>
                                <ul>
                                    <li class="row-sm-1 cardd__description" th:each="item : ${course.getValue()}" th:text="${item.getDayOfWeek().getDayName() + ' ' + item.getBeginTime() + '-' + item.getEndTime()}" style="white-space: nowrap"></li>
                                </ul>
                                <b class="row-sm-1 cardd__description">Term: </b>

                                <p  class=" row-sm-1 cardd__description"> <span class = "date" th:text="${course.getKey().getBeginDate()}"></span>-<span class = "date" th:text="${course.getKey().getEndDate()}"></span></p>

                                <button class="row-sm-2 cardd__button" onclick="submitForm(this);">Try it!</button>

                            </div>
                        </section>
                        </form>
                    </div>
                </th:block>
            </div>
        </div>
        <div class="col-md-1" style="display: flex;align-items: center;justify-content: center;">
            <a href="#" class="right-arrow"><img style="height: 48px; " src="../static/images/right-arrow.svg"></a>
        </div>
    </div>
</div>





<div sec:authorize="isAnonymous()">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

    <div class="modal" id="warningModal" >
        <div class="modal-dialog" aria-hidden="true">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="warningModalLabel" style="color: coral"> Warning! </h5>
                    <button type="button" class="close" data-dismiss="modal" style="border: none; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <p>It seems you aren`t authenticated. To enroll the course you need to be logged in and subscribed. </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>



</div>

<!-- Подключение скриптов Bootstrap и jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>02

<div sec:authorize="isAuthenticated()">


    <div class="modal" id="custom-modal" >
        <div class="modal-dialog" aria-hidden="true">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="myModalLabel"> Are you sure? </h5>
                    <button type="button" id="close-button" class="close" data-dismiss="modal" style="border: none; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <p>Confirm your choice.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="confirm-button">Confirm</button>
                    <button type="button" class="btn btn-secondary" id="cancel-button">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultModalLabel">Purchase Result</h5>
                    <button type="button" class="close" data-dismiss="modal" style="border: none; background: none">
                        <img src="../static/images/close-bold-dark.svg">
                    </button>
                </div>
                <div class="modal-body">
                    <p id="saleResultElement"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>




<script>
    function submitForm(event) {
        event.preventDefault(); // Prevent the default form submission

        var form = event.target.closest('form'); // Find the closest form containing the button

        var modal = document.getElementById('custom-modal');
        modal.style.display = 'block';

        var confirmButton = document.getElementById('confirm-button');
        var cancelButton = document.getElementById('cancel-button');
        var closeButton = document.getElementById('close-button');

        confirmButton.addEventListener('click', function() {
            modal.style.display = 'none';
            form.submit();
        });

        cancelButton.addEventListener('click', function() {
            modal.style.display = 'none';
        });

        closeButton.addEventListener('click', function() {
            modal.style.display = 'none';
        });
    }

    // Add event listener to all the "Try it!" buttons
    var tryButtons = document.querySelectorAll('.cardd__button');
    tryButtons.forEach(function(button) {
        button.addEventListener('click', submitForm);
    });

</script>

<script>
    $(document).ready(function(){
        // Получение значения параметра "saleResult" из URL
        var urlParams = new URLSearchParams(window.location.search);
        var saleResult = urlParams.get('saleResult');

        if (saleResult) {
            $('#saleResultElement').text(saleResult);
            $('#resultModal').modal('show');
        }
    });
</script>

</div>
<script>
    // Функция для форматирования даты
    function formatDate(dateString) {
        const options = { day: 'numeric', month: 'long', year:'numeric' };
        const date = new Date(dateString);
        return date.toLocaleDateString('en', options);
    }

    // Находим все элементы с классом "day" и изменяем их содержимое
    const dayElements = document.querySelectorAll('.date');
    dayElements.forEach(function(element) {
        const originalDate = element.textContent;
        const formattedDate = formatDate(originalDate);
        element.textContent = formattedDate;
    });
</script>

<script>
    // Получение текущего значения dateIndex
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const index = parseInt(urlParams.get('index'));
    var maxPage = [[${maxPages}]];

    // Обработка клика на стрелку влево
    const leftArrow = document.querySelector('.left-arrow');
    leftArrow.addEventListener('click', function() {
        const updatedIndex = index - 1;
        if (updatedIndex >= 0) {
            window.location.href = '/courses?index=' + updatedIndex;
        }
    });

    // Обработка клика на стрелку вправо
    document.addEventListener("DOMContentLoaded", function() {
        const rightArrow = document.querySelector('.right-arrow');
        rightArrow.addEventListener('click', function() {
            const updatedIndex = index + 1;
            if (updatedIndex < maxPage) {
                window.location.href = '/courses?index=' + updatedIndex;
            }
        });
    });
</script>

</body>
</html>
