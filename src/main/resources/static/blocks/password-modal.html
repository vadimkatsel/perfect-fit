<div th:fragment="password-modal">
  <div class="modal fade" id="passwordModal" tabindex="-1" role="dialog" aria-labelledby="passwordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
      <div class="modal-content" style="width: 65%; background-color: rgb(12,19,26)!important; ">
        <div class="modal-header"  style="text-align: center!important; border: none; display: flex; align-items: center;">
          <h5 class="modal-title" id="exampleModalLabel" style="color: #f8f301; font-size: 200%">Change Password</h5>
          <button type="button" class="close" data-dismiss="modal" style="background: none; border: none" aria-label="Close">
            <img src="../static/images/close-bold.svg">
          </button>
        </div>
          <form th:action="@{'/client/change-password'}" method="post">
            <div class="form-group">
              <label for="current-password" style="color: floralwhite !important;">Current password</label>
              <input type="password" name="current-password" class="form-control" id="current-password" placeholder="Enter current password">
            </div>
            <div class="form-group">
              <label for="new-password" style="color: floralwhite !important;">New password</label>
              <input type="password" name="new-password" class="form-control" id="new-password" placeholder="Enter new password">
            </div>
            <div class="form-group">
              <label for="confirm-password" style="color: floralwhite !important;">Confirm new password</label>
              <input type="password" name="confirm-password" class="form-control" id="confirm-password" placeholder="Confirm new password">
            </div>
            <input type="hidden" name="returnUrl" th:value="${returnUrl}">
             <button  type="submit" class="btn btn-success">Save</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <a >Change</a>
</div>
