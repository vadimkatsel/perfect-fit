<div th:fragment ="absence-modal">
  <div sec:authorize="hasRole('ROLE_CLIENT')">
  <div class="modal fade" id="absenceModal" tabindex="-1" role="dialog" aria-labelledby="absenceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" style="display: flex;align-items: center;justify-content: center; height: 100vh;" role="document">
      <div class="modal-content" style=" height: 550px; width: 800px; background-color: rgb(12,19,26)!important; ">
        <div class="modal-header" style="text-align: center!important; border: none;">
          <h5 class="modal-title" id="absenceModalLabel" style="color: #f8f301; font-size: 200%">Absence Form</h5>
          <button type="button" class="close" data-dismiss="modal" style="background: none; border: none" aria-label="Close">
            <img src="../static/images/close-bold.svg">
          </button>
        </div>

        <div class="modal-body">
          <form method="post" action="/client/save-absence-record">
            <input name="${_csrf.parameterName}" value="${_csrf.token}" type="hidden">
            <div class="form-group">
              <label for="reason" style="color: floralwhite !important;">Reason:</label>
              <textarea id="reason" name="reason" rows="6" maxlength="200" placeholder="Enter your reason (max 200 characters)" required></textarea>
            </div>
            <div class="form-group">
              <label for="absenceDateBegin" style="color: floralwhite !important" >Absence Date Begin:</label>
              <input type="date" id="absenceDateBegin" name="absenceDateBegin" required>
            </div>
            <div class="form-group">
              <label for="absenceDateEnd"style="color: floralwhite !important;" >Absence Date End:</label>
              <input type="date" id="absenceDateEnd" name="absenceDateEnd" required>
            </div>
            <div class="modal-footer" style="border: none;">
              <div class="row" style="margin-bottom: 10px; margin-right: 0">
                <div class="col" style="text-align: right">
                  <button type="button" class="btn btn-secondary" data-dismiss="modal" >Cancel</button>
                </div>
                <div class="col" style="text-align: right">
                  <button type="submit" class="btn btn-success">Submit</button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

  <div sec:authorize="hasRole('ROLE_COACH')">
    <div class="modal fade" id="absenceModalCoach" tabindex="-1" role="dialog" aria-labelledby="absenceModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg" style="display: flex;align-items: center;justify-content: center; height: 100vh;" role="document">
        <div class="modal-content" style=" height: 550px; width: 800px; background-color: rgb(12,19,26)!important; ">
          <div class="modal-header" style="text-align: center!important; border: none;">
            <h5 class="modal-title" id="absenceModalCoachLabel" style="color: #f8f301; font-size: 200%">Absence Form</h5>
            <button type="button" class="close" data-dismiss="modal" style="background: none; border: none" aria-label="Close">
              <img src="../static/images/close-bold.svg">
            </button>
          </div>
          <div class="modal-body">
            <form method="post" action="/coach/save-absence-record">
              <input name="${_csrf.parameterName}" value="${_csrf.token}" type="hidden">
              <div class="form-group">
                <label for="reason" style="color: floralwhite !important;">Reason:</label>
                <textarea id="reason" name="reason" rows="6" maxlength="200" placeholder="Enter your reason (max 200 characters)" required></textarea>
              </div>
              <div class="form-group">
                <label for="absenceDateBegin" style="color: floralwhite !important" >Absence Date Begin:</label>
                <input type="date" id="absenceDateBegin" name="absenceDateBegin" required>
              </div>
              <div class="form-group">
                <label for="absenceDateEnd"style="color: floralwhite !important;" >Absence Date End:</label>
                <input type="date" id="absenceDateEnd" name="absenceDateEnd" required>
              </div>
              <div class="modal-footer" style="border: none;">
                <div class="row" style="margin-bottom: 10px; margin-right: 0">
                  <div class="col" style="text-align: right">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal" >Cancel</button>
                  </div>
                  <div class="col" style="text-align: right">
                    <button type="submit" class="btn btn-success">Submit</button>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
